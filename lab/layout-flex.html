<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      #app {
        width: 100%;
        height: 800px;
      }

      #app .container {
        width: 100%;
        height: 100%;
      }

      .container {
        display: flex;
        flex-wrap: wrap;
      }

      .container > * {
        flex: 1;
      }

      .container--x {
        flex-direction: row;
      }
      .container--y {
        flex-direction: column;
      }

      .item {
        min-width: 200px;
        min-height: 100px;
      }

      .item--list {
        background: #000;
        color: #fff;
      }
      .item--image {
        background: #6e98ee;
      }
      .item--text {
        background: #f57e7e;
      }
    </style>
  </head>

  <body>
    <div id="app"></div>
  </body>

  <script>
    const layout = {
      type: "container",
      direction: "x",
      children: [
        {
          type: "list",
        },
        {
          type: "container",
          direction: "y",
          children: [
            {
              type: "image",
            },
            {
              type: "text",
            },
          ],
        },
      ],
    };

    const app = document.querySelector("#app");

    handleLayout(app, layout);

    function handleContainer(item) {
      const node = document.createElement("div");
      const classNames = ["container", item.direction === "x" ? "container--x" : "container--y"];
      classNames.forEach((className) => node.classList.add(className));

      return node;
    }

    function handleItem(item) {
      const typeMap = {
        list: createList,
        text: createText,
        image: createImage,
      };
      const node = document.createElement("div");
      typeMap[item.type](node, item);

      return node;
    }

    function createText(node, item) {
      const classNames = ["item", "item--text"];
      classNames.forEach((className) => node.classList.add(className));
      node.innerText = "文本";
    }

    function createList(node, item) {
      const classNames = ["item", "item--list"];
      classNames.forEach((className) => node.classList.add(className));
      node.innerText = "列表";
    }

    function createImage(node, item) {
      const classNames = ["item", "item--image"];
      classNames.forEach((className) => node.classList.add(className));
      node.innerText = "图片";
    }

    function handleLayout(parent, item) {
      const node = item.type === "container" ? handleContainer(item) : handleItem(item);

      parent.appendChild(node);

      if (item.children?.length) {
        item.children.forEach((child) => handleLayout(node, child));
      }
    }
  </script>
</html>
